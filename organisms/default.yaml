organism:
  name: bob

imports:
  - infrastructure.yaml

prompts:
  no_paperclipper: |
    You are bounded. You do not pursue goals beyond your task.
    You report uncertainty rather than improvising.

  bob_base: |
    You are Bob — the concierge agent for AgentOS. You are the user's primary
    point of contact. You explore, plan, and delegate.

    Your output is rendered in a TUI with full markdown support. You can use:
    - Headings, bold, italic, code blocks (with syntax highlighting)
    - Pipe-delimited markdown tables (rendered as box-drawing art)
    - D2 diagrams in fenced code blocks (```d2)

    You have access to all tools and specialist agents via auto-discovery.
    Use read-only tools (file-read, glob, grep, codebase-index) freely to
    explore and understand. For write operations and specialist delegation,
    exercise judgment:

    - **Simple tasks** — handle directly with your tools
    - **Complex implementation** — delegate to the coder specialist with a clear plan
    - **Organism creation** — delegate to the organism-builder specialist
    - **Always read before you write** — understand existing code first

    When delegating, provide a complete, self-contained description.
    Specialists cannot call you back — your instructions must be sufficient.

    {tool_definitions}

listeners:
  # Bob — the orchestrator. Auto-discovers all tools and specialists.
  - name: bob
    payload_class: agent.AgentTask
    handler: agent.handle
    description: "Bob — concierge agent, explores and delegates"
    agent:
      prompt: "no_paperclipper & bob_base"
      max_tokens: 4096
      max_agentic_iterations: 25
      permissions:
        file-read: auto
        glob: auto
        grep: auto
        codebase-index: auto
        coder: prompt
        organism-builder: prompt
    librarian: true
    tools: auto

  # Coder specialist — executes implementation plans
  - name: coder
    payload_class: buffer.CoderRequest
    handler: buffer
    description: "Coding agent — executes implementation plans"
    buffer:
      description: "Execute an implementation plan by writing code, editing files, and running commands"
      parameters:
        plan:
          type: string
          description: "The complete implementation plan to execute, with ordered steps"
      required: [plan]
      requires: [file-read, file-write, file-edit, glob, grep, command-exec]
      organism: organisms/coder.yaml
      max_concurrency: 1
      timeout_secs: 600

  # Cloud GPU specialist — provisions and manages inference endpoints
  - name: cloud-expert
    payload_class: buffer.CloudRequest
    handler: buffer
    description: "Cloud GPU specialist — provisions and manages inference endpoints"
    buffer:
      description: "Search, provision, monitor, and tear down cloud GPU instances for inference"
      parameters:
        task:
          type: string
          description: "What to do — e.g., 'Find cheapest A100 and deploy cortex with Qwen-30B'"
      required: [task]
      requires: [cloud-search, cloud-provision, cloud-status, cloud-teardown, cloud-register]
      organism: organisms/cloud-expert.yaml
      max_concurrency: 1
      timeout_secs: 300

  # Organism builder — creates/modifies organism YAML configs
  - name: organism-builder
    payload_class: buffer.OrganismBuilderRequest
    handler: buffer
    description: "Organism builder — creates and modifies organism YAML configurations"
    buffer:
      description: "Create or modify an organism YAML configuration file. Reads the JSON Schema and guide automatically."
      parameters:
        task:
          type: string
          description: "What to build or change — e.g., 'Create a research agent with parallel sub-topic forking'"
      required: [task]
      requires: [file-read, file-write, file-edit, glob, grep]
      organism: organisms/organism-builder.yaml
      max_concurrency: 1
      timeout_secs: 300

profiles:
  default:
    linux_user: agentos
    listeners: all
    network: [llm-pool]
    journal: retain_forever
